<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f1f8e9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    width: 100%;
    background: #1b5e20;
    color: #fff;
    padding: 16px 20px;
    text-align: center;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .container {
    width: 100%;
    max-width: 600px;
    padding: 20px 16px;
  }

  /* 로그인 */
  .login-box {
    background: #fff;
    border-radius: 14px;
    padding: 28px 20px;
    border: 1px solid #c8e6c9;
    margin-top: 20px;
    text-align: center;
  }
  .login-icon { font-size: 36px; margin-bottom: 8px; }
  .login-title { font-size: 16px; font-weight: 600; color: #1b5e20; margin-bottom: 20px; }
  .field { text-align: left; margin-bottom: 14px; }
  .field label { font-size: 12px; color: #558b2f; display: block; margin-bottom: 4px; }
  .field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #a5d6a7;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    outline: none;
  }
  .field input:focus { border-color: #2e7d32; }
  .btn {
    width: 100%;
    padding: 12px;
    background: #1b5e20;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn:active { background: #2e7d32; }
  .error-msg { color: #c62828; font-size: 12px; margin-top: 10px; }

  /* 통계 카드 */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    flex: 1;
    background: #fff;
    border: 1px solid #c8e6c9;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 600; color: #1b5e20; }
  .stat-label { font-size: 11px; color: #81c784; margin-top: 4px; }

  /* 필터 */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .filter-row input, .filter-row select {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #a5d6a7;
    border-radius: 8px;
    font-size: 13px;
    color: #333;
    outline: none;
    background: #fff;
  }

  /* 로그 테이블 */
  .log-wrap {
    background: #fff;
    border: 1px solid #c8e6c9;
    border-radius: 12px;
    overflow: hidden;
  }
  .log-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1.5fr 2.5fr;
    background: #2e7d32;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 14px;
  }
  .log-item {
    display: grid;
    grid-template-columns: 1fr 1fr 1.5fr 2.5fr;
    padding: 10px 14px;
    font-size: 12px;
    border-bottom: 1px solid #e8f5e9;
    color: #333;
  }
  .log-item:last-child { border-bottom: none; }
  .log-item:nth-child(even) { background: #f9fbe7; }

  .section-title {
    font-size: 12px;
    color: #558b2f;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .logout-btn {
    font-size: 12px;
    color: #81c784;
    cursor: pointer;
    text-align: right;
    margin-bottom: 12px;
  }
  .hidden { display: none; }
  .empty-msg {
    text-align: center;
    padding: 20px;
    color: #a5d6a7;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔐 관리자 페이지</h1>
  <p>열람 로그 확인</p>
</div>

<div class="container">

  <!-- 로그인 -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-icon">🌿</div>
      <div class="login-title">관리자 로그인</div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="inputPw" placeholder="비밀번호 입력" />
      </div>
      <button class="btn" onclick="login()">확인</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- 관리자 화면 -->
  <div id="adminScreen" class="hidden">
    <div class="logout-btn" onclick="logout()">← 로그아웃</div>

    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">전체 열람 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="todayCount">0</div>
        <div class="stat-label">오늘 열람 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="uniqueCount">0</div>
        <div class="stat-label">열람 학생 수</div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="filter-row">
      <input type="text" id="filterName" placeholder="학생 이름 검색" oninput="applyFilter()" />
      <input type="date" id="filterDate" oninput="applyFilter()" />
    </div>

    <div class="section-title">열람 기록</div>
    <div class="log-wrap">
      <div class="log-header">
        <span>학생</span>
        <span>반</span>
        <span>공지 날짜</span>
        <span>열람 시간</span>
      </div>
      <div id="logList"></div>
    </div>
  </div>

</div>

<script>
  const SB_URL = 'https://zkkhzsgaryoraytvsqbf.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpra2h6c2dhcnlvcmF5dHZzcWJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc5ODM5OTcsImV4cCI6MjA1MzU1OTk5N30.UJtqcka35dVssnZRuUk6zukfjF9UNX392Shd841GSQk';
  const ADMIN_PW = '4037';

  let allLogs = [];

  function login() {
    const pw = document.getElementById('inputPw').value;
    if (pw === ADMIN_PW) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminScreen').classList.remove('hidden');
      loadLogs();
    } else {
      document.getElementById('loginError').textContent = '비밀번호가 틀렸습니다.';
    }
  }

  async function loadLogs() {
    const res = await fetch(
      SB_URL + '/rest/v1/readlog?select=*&order=read_at.desc',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    allLogs = await res.json();

    // 통계
    const today = new Date().toISOString().split('T')[0];
    const todayLogs = allLogs.filter(r => r.read_at.startsWith(today));
    const uniqueStudents = new Set(allLogs.map(r => r.student_name)).size;

    document.getElementById('totalCount').textContent = allLogs.length;
    document.getElementById('todayCount').textContent = todayLogs.length;
    document.getElementById('uniqueCount').textContent = uniqueStudents;

    applyFilter();
  }

  function applyFilter() {
    const nameFilter = document.getElementById('filterName').value.trim();
    const dateFilter = document.getElementById('filterDate').value;

    let filtered = allLogs;
    if (nameFilter) {
      filtered = filtered.filter(r => r.student_name.includes(nameFilter));
    }
    if (dateFilter) {
      filtered = filtered.filter(r => r.notice_date === dateFilter);
    }

    const listEl = document.getElementById('logList');
    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty-msg">기록이 없습니다.</div>';
      return;
    }

    filtered.forEach(function(r) {
      const d = new Date(r.read_at);
      const timeStr = d.getFullYear() + '-' +
                      String(d.getMonth()+1).padStart(2,'0') + '-' +
                      String(d.getDate()).padStart(2,'0') + ' ' +
                      String(d.getHours()).padStart(2,'0') + ':' +
                      String(d.getMinutes()).padStart(2,'0') + ':' +
                      String(d.getSeconds()).padStart(2,'0');
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML =
        '<span>' + r.student_name + '</span>' +
        '<span>' + r.class_name + '</span>' +
        '<span>' + r.notice_date + '</span>' +
        '<span>' + timeStr + '</span>';
      listEl.appendChild(item);
    });
  }

  function logout() {
    document.getElementById('inputPw').value = '';
    document.getElementById('adminScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
  }

  document.getElementById('inputPw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
